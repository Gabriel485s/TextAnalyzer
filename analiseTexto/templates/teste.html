        @keyframes bounce-custom {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-20px);
  }
}

  animation: bounce-custom 1s infinite;
}

.animate-bounce-delay-1 {
  animation: bounce-custom 1s infinite;
  animation-delay: 0.2s;
}

.animate-bounce-delay-2 {
  animation: bounce-custom 1s infinite;
  animation-delay: 0.4s;
}
    </style>
</head>
